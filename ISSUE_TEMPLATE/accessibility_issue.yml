name: ♿ Accessibility Issue
description: Report an accessibility barrier or WCAG compliance issue
title: "[A11Y]: "
labels: ["accessibility", "a11y", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        🌟 **Thank you for helping us make Accessible Justice truly accessible to everyone!**
        
        Accessibility is core to our mission. Every barrier you report helps us improve access to justice for users with disabilities.

  - type: checkboxes
    id: terms
    attributes:
      label: Pre-submission Checklist
      description: Please confirm the following
      options:
        - label: I have checked existing accessibility issues to avoid duplicates
          required: true
        - label: This issue involves a genuine accessibility barrier
          required: true
        - label: I understand this issue will be prioritized for our accessibility team
          required: true

  - type: dropdown
    id: wcag-level
    attributes:
      label: WCAG Compliance Level
      description: What level of WCAG compliance does this issue affect?
      options:
        - "WCAG 2.1 Level A (Critical)"
        - "WCAG 2.1 Level AA (Standard)"
        - "WCAG 2.1 Level AAA (Enhanced)"
        - "Not sure/Multiple levels"
    validations:
      required: true

  - type: dropdown
    id: disability-type
    attributes:
      label: Disability Type Affected
      description: Which types of disabilities are impacted by this barrier?
      multiple: true
      options:
        - Visual impairments (blindness, low vision)
        - Hearing impairments (deafness, hard of hearing)
        - Motor/mobility impairments
        - Cognitive/neurological impairments
        - Multiple disabilities
        - Temporary impairments
        - All users (universal accessibility)
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Barrier Severity
      description: How severe is this accessibility barrier?
      options:
        - "Critical: Complete barrier to access"
        - "High: Major difficulty, workaround possible but problematic"
        - "Medium: Some difficulty, reasonable workaround available"
        - "Low: Minor issue, doesn't significantly impact usability"
    validations:
      required: true

  - type: textarea
    id: assistive-tech
    attributes:
      label: Assistive Technology Used
      description: |
        What assistive technology were you using when you encountered this issue?
        Include version numbers if known
      placeholder: |
        Example:
        - Screen reader: NVDA 2021.3.5
        - Browser: Firefox 95
        - Operating system: Windows 10
        - Keyboard navigation only
        - Voice control software: Dragon NaturallySpeaking 15
    validations:
      required: true

  - type: textarea
    id: barrier-description
    attributes:
      label: Accessibility Barrier Description
      description: Clearly describe the accessibility barrier you encountered
      placeholder: |
        Example: The "Upload Document" button cannot be reached using keyboard navigation. When tabbing through the form, focus jumps over the button entirely.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce the Barrier
      description: Detailed steps to encounter this accessibility issue
      placeholder: |
        1. Navigate to the document upload page using keyboard only
        2. Tab through all form elements
        3. Notice that focus skips over the "Upload Document" button
        4. Unable to activate the button without using a mouse
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Accessible Behavior
      description: What should happen for this to be accessible?
      placeholder: |
        Example: The "Upload Document" button should be focusable via keyboard navigation and activatable with the Enter key or Space bar.
    validations:
      required: true

  - type: textarea
    id: current-workaround
    attributes:
      label: Current Workaround
      description: |
        Is there any workaround available? How difficult is it to use?
        Rate the workaround difficulty: Easy / Moderate / Difficult / Impossible
      placeholder: |
        Example: I can click the button with a mouse, but this defeats the purpose of keyboard-only navigation. Workaround difficulty: Impossible for keyboard-only users.

  - type: dropdown
    id: impact-area
    attributes:
      label: Feature/Page Affected
      description: Which part of the application has this accessibility issue?
      options:
        - Homepage/Landing page
        - User registration/login
        - Document upload/processing
        - Legal analysis results
        - User profile/settings
        - Help/Support pages
        - Search functionality
        - Navigation menu
        - Forms (general)
        - Mobile interface
        - Other (specify in additional context)
    validations:
      required: true

  - type: dropdown
    id: success-criteria
    attributes:
      label: WCAG Success Criteria
      description: |
        If you know which WCAG success criteria this violates, please select it
        (If unsure, select "Not sure" - our team will identify it)
      options:
        - "1.1.1 Non-text Content"
        - "1.2.1 Audio-only and Video-only (Prerecorded)"
        - "1.2.2 Captions (Prerecorded)"
        - "1.3.1 Info and Relationships"
        - "1.3.2 Meaningful Sequence"
        - "1.4.1 Use of Color"
        - "1.4.3 Contrast (Minimum)"
        - "2.1.1 Keyboard"
        - "2.1.2 No Keyboard Trap"
        - "2.4.1 Bypass Blocks"
        - "2.4.2 Page Titled"
        - "2.4.3 Focus Order"
        - "2.4.4 Link Purpose (In Context)"
        - "2.4.6 Headings and Labels"
        - "2.4.7 Focus Visible"
        - "3.1.1 Language of Page"
        - "3.2.1 On Focus"
        - "3.2.2 On Input"
        - "3.3.1 Error Identification"
        - "3.3.2 Labels or Instructions"
        - "4.1.1 Parsing"
        - "4.1.2 Name, Role, Value"
        - "Not sure"
        - "Multiple criteria"

  - type: textarea
    id: technical-details
    attributes:
      label: Technical Details
      description: |
        Any technical details that might help developers fix this issue?
        (HTML structure, ARIA attributes, JavaScript errors, etc.)
      render: text
      placeholder: |
        Example:
        - Missing aria-label on the button
        - Button has tabindex="-1" 
        - Focus outline is invisible due to CSS
        - JavaScript prevents keyboard events

  - type: textarea
    id: error-messages
    attributes:
      label: Error Messages or Console Output
      description: |
        Any error messages or console output related to this accessibility issue?
      render: text
      placeholder: Paste any relevant error messages here

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots/Screen Recordings
      description: |
        Visual documentation of the accessibility issue
        For screen reader issues, consider recording audio of the screen reader output
        You can drag and drop files directly here
      placeholder: |
        Please provide:
        - Screenshots showing the visual issue
        - Screen recordings demonstrating the barrier
        - Audio recordings of screen reader output (if applicable)

  - type: dropdown
    id: user-impact
    attributes:
      label: User Impact Assessment
      description: How many users might be affected by this accessibility barrier?
      options:
        - "High: Affects many users with disabilities"
        - "Medium: Affects some users with specific disabilities"
        - "Low: Affects few users in specific scenarios"
        - "Unknown: Unable to assess impact"

  - type: textarea
    id: suggested-fix
    attributes:
      label: Suggested Solution
      description: |
        If you have ideas for how to fix this accessibility issue, please share them
        (This is optional but very helpful!)
      placeholder: |
        Example: Add proper keyboard event handlers and ensure the button has a visible focus indicator with tabindex="0"

  - type: textarea
    id: legal-context
    attributes:
      label: Legal Context Impact
      description: |
        Does this accessibility barrier particularly impact users' ability to access legal services?
        How does it affect their legal rights or proceedings?
      placeholder: |
        Example: Users with visual impairments cannot upload their eviction notices for analysis, preventing them from understanding their legal rights and deadlines.

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: |
        Any other information that would help us understand and fix this accessibility issue
        - Similar issues you've encountered on other sites
        - Resources or documentation that might help
        - Urgency factors
      placeholder: Any additional context that would be helpful for resolving this accessibility barrier