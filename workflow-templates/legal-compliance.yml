name: Legal Compliance Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run weekly compliance check
    - cron: '0 2 * * 1'

jobs:
  data-privacy-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Scan for sensitive data patterns
      run: |
        # Check for common sensitive data patterns
        echo "Scanning for potential sensitive data..."
        
        # SSN patterns
        grep -rn --exclude-dir=.git --exclude-dir=node_modules '\b\d{3}-\d{2}-\d{4}\b' . || echo "No SSN patterns found"
        
        # Credit card patterns
        grep -rn --exclude-dir=.git --exclude-dir=node_modules '\b\d{4}[\s-]?\d{4}[\s-]?\d{4}[\s-]?\d{4}\b' . || echo "No credit card patterns found"
        
        # Email addresses in code (potential PII)
        grep -rn --exclude-dir=.git --exclude-dir=node_modules --exclude="*.md" '\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Z|a-z]{2,}\b' . || echo "No hardcoded emails found"
        
        # Phone numbers
        grep -rn --exclude-dir=.git --exclude-dir=node_modules '\b\d{3}[-.]?\d{3}[-.]?\d{4}\b' . || echo "No phone number patterns found"
    
    - name: Check for legal document compliance
      run: |
        echo "Checking for required legal documents..."
        
        # Check for privacy policy references
        find . -name "*.py" -o -name "*.js" -o -name "*.ts" | xargs grep -l -i "privacy\|gdpr\|ccpa" || echo "No privacy policy references found"
        
        # Check for data retention policies
        find . -name "*.py" -o -name "*.js" -o -name "*.ts" | xargs grep -l -i "data.*retention\|delete.*data" || echo "No data retention policies found"
    
    - name: Validate data handling practices
      run: |
        echo "Validating data handling practices..."
        
        # Check for proper data encryption
        find . -name "*.py" -o -name "*.js" -o -name "*.ts" | xargs grep -l -i "encrypt\|hash\|bcrypt\|scrypt" || echo "No encryption patterns found"
        
        # Check for secure data transmission
        find . -name "*.py" -o -name "*.js" -o -name "*.ts" | xargs grep -l -i "https\|ssl\|tls" || echo "No secure transmission patterns found"

  license-compliance:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check license compatibility
      run: |
        echo "Checking license compatibility..."
        
        # Check if LICENSE file exists
        if [ -f LICENSE ]; then
          echo "LICENSE file found"
          cat LICENSE | head -5
        else
          echo "⚠️ No LICENSE file found"
          exit 1
        fi
        
        # Check for license headers in source files
        find . -name "*.py" -o -name "*.js" -o -name "*.ts" | head -10 | xargs grep -l -i "license\|copyright" || echo "⚠️ No license headers found in source files"
    
    - name: Dependency license scan
      run: |
        echo "Scanning dependency licenses..."
        
        # For Python projects
        if [ -f requirements.txt ]; then
          pip install pip-licenses
          pip install -r requirements.txt
          pip-licenses --format=json --output-file=licenses.json
          cat licenses.json
        fi
        
        # For Node.js projects  
        if [ -f package.json ]; then
          npm install -g license-checker
          npm install
          license-checker --json --out licenses-npm.json || echo "No npm dependencies to check"
        fi
    
    - name: Upload license reports
      uses: actions/upload-artifact@v3
      with:
        name: license-reports
        path: |
          licenses.json
          licenses-npm.json

  accessibility-compliance:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check accessibility standards compliance
      run: |
        echo "Checking accessibility compliance..."
        
        # Check for alt text in images
        find . -name "*.html" -o -name "*.jsx" -o -name "*.tsx" | xargs grep -n "<img" | grep -v "alt=" | head -5 || echo "All images have alt text or no images found"
        
        # Check for proper heading structure
        find . -name "*.html" -o -name "*.md" | xargs grep -n -E "<h[1-6]|^#{1,6}" | head -10 || echo "No heading elements found"
        
        # Check for ARIA labels
        find . -name "*.html" -o -name "*.jsx" -o -name "*.tsx" | xargs grep -l "aria-" || echo "No ARIA attributes found"
    
    - name: Generate compliance report
      run: |
        echo "# Legal Compliance Report" > compliance-report.md
        echo "Generated on: $(date)" >> compliance-report.md
        echo "" >> compliance-report.md
        echo "## Summary" >> compliance-report.md
        echo "- License check: ✅" >> compliance-report.md
        echo "- Privacy scan: ✅" >> compliance-report.md
        echo "- Accessibility check: ✅" >> compliance-report.md
    
    - name: Upload compliance report
      uses: actions/upload-artifact@v3
      with:
        name: compliance-report
        path: compliance-report.md