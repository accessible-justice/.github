name: Security Scanning

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run security scan daily at 2 AM
    - cron: '0 2 * * *'

jobs:
  dependency-security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install security scanning tools
      run: |
        pip install safety bandit semgrep
        npm install -g audit-ci
    
    - name: Python dependency security scan
      run: |
        if [ -f requirements.txt ]; then
          echo "Running safety check on Python dependencies..."
          pip install -r requirements.txt
          safety check --json --output safety-report.json || echo "Security issues found"
        else
          echo "No requirements.txt found, skipping Python dependency scan"
        fi
    
    - name: Node.js dependency security scan  
      run: |
        if [ -f package.json ]; then
          echo "Running npm audit on Node.js dependencies..."
          npm install
          npm audit --audit-level moderate --json > npm-audit.json || echo "Security issues found"
          audit-ci --moderate || echo "Critical vulnerabilities found"
        else
          echo "No package.json found, skipping Node.js dependency scan"
        fi
    
    - name: Upload dependency scan reports
      uses: actions/upload-artifact@v3
      with:
        name: dependency-security-reports
        path: |
          safety-report.json
          npm-audit.json

  code-security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install code security tools
      run: |
        pip install bandit semgrep
    
    - name: Run Bandit security scan (Python)
      run: |
        if find . -name "*.py" | grep -q .; then
          echo "Running Bandit security scan on Python code..."
          bandit -r . -f json -o bandit-report.json || echo "Security issues found"
          bandit -r . -f txt || echo "Security issues found"
        else
          echo "No Python files found, skipping Bandit scan"
        fi
    
    - name: Run Semgrep security scan
      run: |
        echo "Running Semgrep security scan..."
        semgrep --config=auto --json --output=semgrep-report.json . || echo "Security issues found"
        semgrep --config=auto . || echo "Security issues found"
    
    - name: Upload code security reports
      uses: actions/upload-artifact@v3
      with:
        name: code-security-reports
        path: |
          bandit-report.json
          semgrep-report.json

  secret-scanning:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Install secret scanning tools
      run: |
        # Install gitleaks
        wget https://github.com/zricethezav/gitleaks/releases/download/v8.18.0/gitleaks_8.18.0_linux_x64.tar.gz
        tar -xzf gitleaks_8.18.0_linux_x64.tar.gz
        chmod +x gitleaks
        sudo mv gitleaks /usr/local/bin/
        
        # Install truffleHog
        pip install truffleHog
    
    - name: Run Gitleaks scan
      run: |
        echo "Running Gitleaks secret scan..."
        gitleaks detect --source . --report-format json --report-path gitleaks-report.json || echo "Potential secrets found"
        gitleaks detect --source . || echo "Potential secrets found"
    
    - name: Run TruffleHog scan
      run: |
        echo "Running TruffleHog secret scan..."
        trufflehog --json --regex . > trufflehog-report.json || echo "Potential secrets found"
    
    - name: Check for common secret patterns
      run: |
        echo "Checking for common secret patterns..."
        
        # API keys
        grep -r -n --exclude-dir=.git --exclude-dir=node_modules "api[_-]?key" . || echo "No API key patterns found"
        
        # Database URLs
        grep -r -n --exclude-dir=.git --exclude-dir=node_modules "mongodb://\|postgres://\|mysql://" . || echo "No database URLs found"
        
        # AWS credentials
        grep -r -n --exclude-dir=.git --exclude-dir=node_modules "AKIA[0-9A-Z]{16}" . || echo "No AWS access keys found"
        
        # JWT tokens
        grep -r -n --exclude-dir=.git --exclude-dir=node_modules "eyJ[A-Za-z0-9-_=]+" . || echo "No JWT tokens found"
    
    - name: Upload secret scanning reports
      uses: actions/upload-artifact@v3
      with:
        name: secret-scanning-reports
        path: |
          gitleaks-report.json
          trufflehog-report.json

  container-security:
    runs-on: ubuntu-latest
    if: contains(github.repository, 'docker') || contains(github.event.head_commit.message, 'docker')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Trivy container scan
      if: hashFiles('Dockerfile') != ''
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy scan results
      if: hashFiles('Dockerfile') != ''
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  security-report:
    runs-on: ubuntu-latest
    needs: [dependency-security, code-security-scan, secret-scanning]
    if: always()
    
    steps:
    - name: Download all security reports
      uses: actions/download-artifact@v3
    
    - name: Generate security summary
      run: |
        echo "# Security Scan Summary" > security-summary.md
        echo "Generated on: $(date)" >> security-summary.md
        echo "" >> security-summary.md
        
        echo "## Scans Performed" >> security-summary.md
        echo "- ✅ Dependency Security Scan" >> security-summary.md
        echo "- ✅ Code Security Scan" >> security-summary.md
        echo "- ✅ Secret Scanning" >> security-summary.md
        
        if [ -d container-security-reports ]; then
          echo "- ✅ Container Security Scan" >> security-summary.md
        else
          echo "- ⏭️ Container Security Scan (Skipped - No Dockerfile)" >> security-summary.md
        fi
        
        echo "" >> security-summary.md
        echo "## Report Files" >> security-summary.md
        find . -name "*.json" -type f | while read file; do
          echo "- $file" >> security-summary.md
        done
        
        cat security-summary.md
    
    - name: Upload security summary
      uses: actions/upload-artifact@v3
      with:
        name: security-summary
        path: security-summary.md